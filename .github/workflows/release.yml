name: Release VSIX

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (must already exist, e.g. v0.1.18)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          version="${ref#v}"
          pkg_version=$(node -p "require('./extension/package.json').version")
          if [ "$version" != "$pkg_version" ]; then
            echo "::error::Tag '$ref' (version '$version') does not match extension/package.json version '$pkg_version'"
            exit 1
          fi
          echo "tag=$ref"           >> "$GITHUB_OUTPUT"
          echo "version=$version"   >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps
        working-directory: extension
        run: npm ci

      - name: Run extension tests
        working-directory: extension
        run: npm test

      - name: Package VSIX
        run: node scripts/package-vsix.cjs

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          version="${{ steps.ver.outputs.version }}"
          file="extension/CHANGELOG.md"
          notes=$(awk -v v="$version" '
            $0 ~ "^## "v"( |$| -)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' "$file")
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](extension/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<__EOF__"
            echo "$notes"
            echo
            echo "## Install"
            echo
            echo "- VS Code: [Marketplace](https://marketplace.visualstudio.com/items?itemName=Tolbxela.taskdev)"
            echo "- Cursor / Windsurf: [Open VSX](https://open-vsx.org/extension/tolbxela/taskdev)"
            echo "- Manual: download \`taskdev-$version.vsix\` below and run **Extensions: Install from VSIX…** in your editor."
            echo
            echo "Site: https://taskdev.dev"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: versions/taskdev-${{ steps.ver.outputs.version }}.vsix
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        working-directory: extension
        run: npx --yes @vscode/vsce publish --pat "$VSCE_PAT" --packagePath "../versions/taskdev-${{ steps.ver.outputs.version }}.vsix"

      - name: Skip VS Code Marketplace (no VSCE_PAT)
        if: env.VSCE_PAT == ''
        run: echo "::warning::VSCE_PAT secret not set — skipping Marketplace publish."

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish "versions/taskdev-${{ steps.ver.outputs.version }}.vsix" --pat "$OVSX_PAT"

      - name: Skip Open VSX (no OVSX_PAT)
        if: env.OVSX_PAT == ''
        run: echo "::warning::OVSX_PAT secret not set — skipping Open VSX publish."
